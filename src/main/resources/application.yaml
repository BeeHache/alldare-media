spring:
  application:
    name: alldare-media
  
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:password}
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

alldare:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    access-key: ${AWS_S3_ACCESS_KEY:minioadmin}
    secret-key: ${AWS_S3_SECRET_KEY:minioadmin}
    bucket: ${AWS_S3_BUCKET:posts}
    region: ${AWS_S3_REGION:us-east-1}
    path-style-access: true
  cdn:
    base-url: ${CDN_BASE_URL:http://localhost:9000/posts}

server:
  port: 8081

logging:
  level:
    online.alldare.media: INFO
    org.springframework.web: INFO
