spring:
  application:
    name: alldare-media
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

alldare:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    access-key: ${AWS_S3_ACCESS_KEY:minioadmin}
    secret-key: ${AWS_S3_SECRET_KEY:minioadmin}
    bucket: ${AWS_S3_BUCKET:posts}
    region: ${AWS_S3_REGION:us-east-1}
    path-style-access: true

server:
  port: 8081

logging:
  level:
    online.alldare.media: INFO
    org.springframework.web: INFO
