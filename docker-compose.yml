services:
  minio:
    image: minio/minio
    container_name: alldare-media-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: alldare-media-postgres
    environment:
      POSTGRES_USER: alldare
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alldare_media
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alldare -d alldare_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  alldare-media:
    build:
      context: ..
      dockerfile: alldare-media/Dockerfile
    container_name: alldare-media-service
    ports:
      - "8081:8081"
    environment:
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_ACCESS_KEY: minioadmin
      AWS_S3_SECRET_KEY: minioadmin
      AWS_S3_BUCKET: posts
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/alldare_media
      SPRING_DATASOURCE_USERNAME: alldare
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data: